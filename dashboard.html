<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GURUKUL IAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .portal-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .portal-header { margin-bottom: 50px; border-bottom: 4px solid var(--primary); padding-bottom: 30px; }
        .portal-header img { width: 100px; border-radius: 15px; margin-bottom: 20px; border: 3px solid var(--primary); }
        .portal-header h1 { font-size: 3rem; font-weight: 900 !important; letter-spacing: -2px; text-transform: uppercase; margin: 0; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; margin-bottom: 80px; text-align: left; }
        .history-list { background: var(--card); border: 2px solid var(--border); border-radius: 32px; padding: 30px; overflow: hidden; }
        .history-item { padding: 20px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; transition: 0.2s; cursor: pointer; }
        .history-item:hover { background: #000; border-color: var(--primary); }
        .chart-card { background: var(--card); border: 2px solid var(--border); border-radius: 32px; padding: 40px; }
        
        .user-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    </style>
</head>
<body data-theme="dark">
    <main class="portal-container">
        <header class="portal-header">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <img src="gurukul_ias.jpeg" alt="GURUKUL IAS">
                <h1 id="student-name">HELLO</h1>
            </a>
            <div class="user-meta">
                <p id="student-id" style="color: var(--secondary-text); font-weight: 800 !important; font-size: 1.2rem; margin: 0;"></p>
                <div style="display: flex; gap: 15px;">
                    <button class="btn-primary" onclick="location.href='index.html'" style="padding: 10px 20px; font-size: 14px;">NEW TEST</button>
                    <button class="btn-secondary" onclick="logout()" style="padding: 10px 20px; font-size: 14px; border-color: #ef4444; color: #ef4444;">LOGOUT</button>
                </div>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="history-list">
                <h4 style="margin-top: 0; color: #444; text-transform: uppercase; margin-bottom: 20px;">Past Assessments</h4>
                <div id="history-items">
                    <div class="loading-state">FETCHING RECORDS...</div>
                </div>
            </div>
            <div class="chart-card">
                <h4 style="margin-top: 0; color: #444; text-transform: uppercase; margin-bottom: 30px;">Growth Trajectory</h4>
                <canvas id="evolutionChart"></canvas>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-bottom">© 2026 GURUKUL IAS. ALL RIGHTS RESERVED.</div>
        </div>
    </footer>

    <script>
        const student = JSON.parse(localStorage.getItem('student'));
        if (!student) location.href = 'login.html';
        
        document.getElementById('student-name').innerText = student.name.toUpperCase();
        document.getElementById('student-id').innerText = student.student_id;

        async function loadHistory() {
            const res = await fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'student_history', student_db_id: student.id })
            });
            const data = await res.json();
            const container = document.getElementById('history-items');
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="padding: 60px; text-align: center; color: #333; font-weight: 900 !important;">NO RECORDS FOUND.</div>';
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="history-item" onclick="location.href='verify.php?v=${item.verification_hash}'">
                    <div>
                        <div style="font-size: 18px; color: #fff; font-weight: 900 !important;">${item.test_type.toUpperCase()}</div>
                        <div style="font-size: 12px; color: #444; font-weight: 900 !important;">${new Date(item.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="badge" style="background: var(--primary); color: #fff; border: none; padding: 6px 15px; font-weight: 900 !important;">${item.total_score}</div>
                </div>
            `).join('');

            renderEvolutionChart(data.reverse());
        }

        function renderEvolutionChart(history) {
            const ctx = document.getElementById('evolutionChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => new Date(h.created_at).toLocaleDateString()),
                    datasets: [{
                        label: 'Score',
                        data: history.map(h => h.total_score),
                        borderColor: '#e11d48',
                        backgroundColor: 'rgba(225, 29, 72, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 5,
                        pointRadius: 8,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#111' }, ticks: { color: '#444', font: { weight: '900' } } },
                        x: { grid: { display: false }, ticks: { color: '#444', font: { weight: '900' } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function logout() { localStorage.removeItem('student'); location.href = 'login.html'; }
        loadHistory();
    </script>
</body>
</html>
