<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - GURUKUL IAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-container { max-width: 1200px; margin: 40px auto; padding: 30px; }
        .welcome-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; padding-bottom: 30px; border-bottom: 4px solid var(--primary); }
        .history-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 50px; }
        .history-list { background: var(--card); border: 2px solid var(--border); border-radius: 32px; padding: 30px; }
        .history-item { 
            padding: 20px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; cursor: pointer;
        }
        .history-item:hover { background: #000; border-color: var(--primary); }
        .history-item:last-child { border-bottom: none; }
        .chart-card { background: var(--card); border: 2px solid var(--border); border-radius: 32px; padding: 40px; }
        .empty-state { text-align: center; padding: 80px; color: var(--secondary-text); font-weight: 900 !important; }
    </style>
</head>
<body data-theme="dark">
    <div class="dashboard-container">
        <div class="welcome-header">
            <div>
                <h1 style="font-size: 3rem; font-weight: 900 !important; margin: 0; text-transform: uppercase; letter-spacing: -2px;">HELLO, <span id="student-name" style="color: var(--primary)">STUDENT</span></h1>
                <p id="student-id" style="color: var(--secondary-text); font-weight: 900 !important; font-size: 1.2rem; margin-top: 5px;"></p>
            </div>
            <div style="display: flex; gap: 20px;">
                <button class="btn-primary" onclick="location.href='index.html'">NEW TEST</button>
                <button class="btn-secondary" onclick="logout()">LOGOUT</button>
            </div>
        </div>

        <div class="history-grid">
            <div class="history-list">
                <h3 style="margin-top: 0; margin-bottom: 25px; color: var(--primary); text-transform: uppercase;">ASSESSMENT HISTORY</h3>
                <div id="history-items">
                    <div class="loading-state">FETCHING RECORDS...</div>
                </div>
            </div>
            <div class="chart-card">
                <h3 style="margin-top: 0; margin-bottom: 30px; text-transform: uppercase;">INTELLIGENCE EVOLUTION</h3>
                <canvas id="evolutionChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const student = JSON.parse(localStorage.getItem('student'));
        if (!student) location.href = 'login.html';
        
        document.getElementById('student-name').innerText = student.name.toUpperCase();
        document.getElementById('student-id').innerText = student.student_id;

        async function loadHistory() {
            const res = await fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'student_history', student_db_id: student.id })
            });
            const data = await res.json();
            const container = document.getElementById('history-items');
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state">NO ASSESSMENTS FOUND.</div>';
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="history-item" onclick="viewResult('${item.verification_hash}')">
                    <div>
                        <div style="font-weight:900 !important; text-transform:uppercase">${item.test_type}</div>
                        <div style="font-size:13px; color:var(--secondary-text)">${new Date(item.created_at).toLocaleDateString()}</div>
                    </div>
                    <div style="text-align:right">
                        <div class="badge" style="background:var(--primary); color:#fff; border:none; padding:5px 12px">${item.total_score}</div>
                    </div>
                </div>
            `).join('');

            renderEvolutionChart(data.reverse());
        }

        function renderEvolutionChart(history) {
            const ctx = document.getElementById('evolutionChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => new Date(h.created_at).toLocaleDateString()),
                    datasets: [{
                        label: 'Total Score',
                        data: history.map(h => h.total_score),
                        borderColor: '#e11d48',
                        backgroundColor: 'rgba(225, 29, 72, 0.2)',
                        fill: true,
                        tension: 0.3,
                        borderWidth: 4,
                        pointRadius: 6,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#1a1a1a' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function viewResult(hash) {
            location.href = `verify.php?v=${hash}`;
        }

        function logout() {
            localStorage.removeItem('student');
            location.href = 'login.html';
        }

        loadHistory();
    </script>
</body>
</html>
