<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - GURUKUL IAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .welcome-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .history-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; }
        .history-list { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 20px; }
        .history-item { 
            padding: 15px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; cursor: pointer;
        }
        .history-item:hover { background: #111; }
        .history-item:last-child { border-bottom: none; }
        .chart-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 30px; }
        .empty-state { text-align: center; padding: 60px; color: #64748b; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="welcome-header">
            <div>
                <h1 style="font-size: 2.5rem; font-weight: 900;">Hello, <span id="student-name" style="color: var(--primary)">Student</span></h1>
                <p id="student-id" style="color: #64748b; font-weight: bold;"></p>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="btn-primary" onclick="location.href='index.html'">NEW ASSESSMENT</button>
                <button class="btn-secondary" onclick="logout()">LOGOUT</button>
            </div>
        </div>

        <div class="history-grid">
            <div class="history-list">
                <h3 style="margin-top: 0; padding: 10px;">Assessment History</h3>
                <div id="history-items">
                    <!-- History injected here -->
                    <div class="loading-state">Loading history...</div>
                </div>
            </div>
            <div class="chart-card">
                <h3 style="margin-top: 0; margin-bottom: 20px;">Intelligence Evolution</h3>
                <canvas id="evolutionChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const student = JSON.parse(localStorage.getItem('student'));
        if (!student) location.href = 'login.html';
        
        document.getElementById('student-name').innerText = student.name;
        document.getElementById('student-id').innerText = student.student_id;

        async function loadHistory() {
            const res = await fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'student_history', student_db_id: student.id })
            });
            const data = await res.json();
            const container = document.getElementById('history-items');
            
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state">No assessments found yet.</div>';
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="history-item" onclick="viewResult('${item.verification_hash}')">
                    <div>
                        <div style="font-weight:bold">${item.test_type} Questions</div>
                        <div style="font-size:12px; color:#64748b">${new Date(item.created_at).toLocaleDateString()}</div>
                    </div>
                    <div style="text-align:right">
                        <div class="badge" style="background:var(--primary); color:#fff">${item.total_score}</div>
                        <div style="font-size:10px; color:#64748b">${item.grade}</div>
                    </div>
                </div>
            `).join('');

            renderEvolutionChart(data.reverse());
        }

        function renderEvolutionChart(history) {
            const ctx = document.getElementById('evolutionChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => new Date(h.created_at).toLocaleDateString()),
                    datasets: [{
                        label: 'Total Score',
                        data: history.map(h => h.total_score),
                        borderColor: '#e11d48',
                        backgroundColor: 'rgba(225, 29, 72, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    scales: { y: { beginAtZero: true } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function viewResult(hash) {
            location.href = `verify.php?v=${hash}`;
        }

        function logout() {
            localStorage.removeItem('student');
            location.href = 'login.html';
        }

        loadHistory();
    </script>
</body>
</html>
