<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - GURUKUL IAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { max-width: 500px; margin: 100px auto; padding: 60px; background: var(--card); border: 3px solid var(--border); border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .auth-container h2 { font-size: 3rem; font-weight: 900 !important; margin-bottom: 40px; text-align: center; text-transform: uppercase; letter-spacing: -2px; }
        .auth-footer { margin-top: 40px; text-align: center; color: var(--secondary-text); font-size: 1rem; font-weight: 800 !important; }
        .auth-footer a { color: var(--primary); text-decoration: none; border-bottom: 2px solid var(--primary); }
    </style>
</head>
<body data-theme="dark">
    <div class="auth-container">
        <h2>STUDENT <span style="color: var(--primary)">LOGIN</span></h2>
        <form id="login-form">
            <div class="input-group">
                <label>EMAIL OR MOBILE</label>
                <input type="text" id="login" placeholder="ENTER CREDENTIALS" required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 30px; font-size: 20px;">SIGN IN</button>
        </form>
        <div class="auth-footer">
            NEW HERE? <a href="#" onclick="showRegister()">CREATE ACCOUNT</a>
        </div>
    </div>

    <div id="register-container" class="auth-container" style="display: none;">
        <h2>JOIN <span style="color: var(--primary)">GURUKUL</span></h2>
        <form id="register-form">
            <div class="input-group">
                <label>FULL NAME</label>
                <input type="text" id="name" placeholder="ENTER NAME" required>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
                <div class="input-group">
                    <label>AGE</label>
                    <input type="number" id="age" placeholder="AGE" required>
                </div>
                <div class="input-group">
                    <label>MOBILE</label>
                    <input type="tel" id="mobile" placeholder="10 DIGITS" required>
                </div>
            </div>
            <div class="input-group">
                <label>EMAIL ADDRESS</label>
                <input type="email" id="email" placeholder="EMAIL@EXAMPLE.COM" required>
            </div>
            <div class="input-group">
                <label>CREATE PASSWORD</label>
                <input type="password" id="reg-password" placeholder="PASSWORD" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 30px; font-size: 20px;">REGISTER</button>
        </form>
        <div class="auth-footer">
            ALREADY REGISTERED? <a href="#" onclick="showLogin()">LOGIN NOW</a>
        </div>
    </div>

    <script>
        function showRegister() {
            document.querySelector('.auth-container').style.display = 'none';
            document.getElementById('register-container').style.display = 'block';
        }
        function showLogin() {
            document.getElementById('register-container').style.display = 'none';
            document.querySelector('.auth-container').style.display = 'block';
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: 'student_login',
                    login: document.getElementById('login').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.status === 'success') {
                localStorage.setItem('student', JSON.stringify(data.user));
                location.href = 'dashboard.html';
            } else {
                alert(data.error);
            }
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: 'student_register',
                    name: document.getElementById('name').value,
                    age: document.getElementById('age').value,
                    mobile: document.getElementById('mobile').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('reg-password').value
                })
            });
            const data = await res.json();
            if (data.status === 'success') {
                alert('Account created! Please login.');
                showLogin();
            } else {
                alert(data.error);
            }
        };
    </script>
</body>
</html>
