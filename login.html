<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - GURUKUL IAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { max-width: 500px; margin: 80px auto; padding: 60px; background: var(--card); border: 3px solid var(--border); border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .auth-container h2 { font-size: 2.5rem; font-weight: 900 !important; margin-bottom: 30px; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body data-theme="dark">
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="brand">
                <img src="gurukul_ias.jpeg" alt="Logo" class="logo-icon">
                <div class="brand-text">
                    <h1>GURUKUL IAS</h1>
                    <p>Student Portal</p>
                </div>
            </a>
            <div class="header-actions">
                <button class="btn-secondary" onclick="location.href='index.html'" style="padding: 8px 20px; font-size: 13px;">BACK TO HOME</button>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div id="login-view">
            <h2>STUDENT <span style="color: var(--primary)">LOGIN</span></h2>
            <form id="login-form">
                <div class="input-group">
                    <label>EMAIL OR MOBILE</label>
                    <input type="text" id="login" placeholder="CREDENTIALS" required>
                </div>
                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">SIGN IN</button>
            </form>
            <p style="text-align: center; margin-top: 30px; font-size: 14px;">NEW HERE? <a href="#" onclick="toggleAuth(true)" style="color: var(--primary); text-decoration: none; border-bottom: 2px solid var(--primary);">CREATE ACCOUNT</a></p>
        </div>

        <div id="register-view" style="display: none;">
            <h2>JOIN <span style="color: var(--primary)">GURUKUL</span></h2>
            <form id="register-form">
                <div class="input-group"><label>NAME</label><input type="text" id="name" required></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="input-group"><label>AGE</label><input type="number" id="age" required></div>
                    <div class="input-group"><label>MOBILE</label><input type="tel" id="mobile" required></div>
                </div>
                <div class="input-group"><label>EMAIL</label><input type="email" id="email" required></div>
                <div class="input-group"><label>PASSWORD</label><input type="password" id="reg-password" required></div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">REGISTER</button>
            </form>
            <p style="text-align: center; margin-top: 30px; font-size: 14px;">ALREADY REGISTERED? <a href="#" onclick="toggleAuth(false)" style="color: var(--primary); text-decoration: none; border-bottom: 2px solid var(--primary);">LOGIN</a></p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-bottom">© 2026 GURUKUL IAS. ALL RIGHTS RESERVED.</div>
        </div>
    </footer>

    <script>
        function toggleAuth(isRegister) {
            document.getElementById('login-view').style.display = isRegister ? 'none' : 'block';
            document.getElementById('register-view').style.display = isRegister ? 'block' : 'none';
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: 'student_login',
                    login: document.getElementById('login').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.status === 'success') {
                localStorage.setItem('student', JSON.stringify(data.user));
                location.href = 'dashboard.html';
            } else alert(data.error);
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: 'student_register',
                    name: document.getElementById('name').value,
                    age: document.getElementById('age').value,
                    mobile: document.getElementById('mobile').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('reg-password').value
                })
            });
            const data = await res.json();
            if (data.status === 'success') { alert('Account created! Login now.'); toggleAuth(false); }
            else alert(data.error);
        };
    </script>
</body>
</html>
